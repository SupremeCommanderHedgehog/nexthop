# cargo-deny configuration.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ─── Advisories ─────────────────────────────────────────────────────
[advisories]
version = 2
yanked = "deny"
ignore = [
    # GHSA-wrw7-89jp-8q8g / RUSTSEC-2024-0429 — glib < 0.20.0 unsoundness
    # in VariantStrIter. Linux-only transitive via tauri → wry → gtk-rs
    # 0.18; there is no tauri 2.x release on gtk-rs 0.20 yet. Revisit when
    # tauri/wry upgrade.
    "RUSTSEC-2024-0429",
]

# ─── Licenses ───────────────────────────────────────────────────────
# This project is GPL-3.0-or-later. Allow common permissive licenses
# that are compatible with GPL distribution, plus the GPL/MPL families.
[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "GPL-3.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

[[licenses.exceptions]]
# `ring` ships a custom license that combines ISC, MIT, and OpenSSL
# clauses. Allow it explicitly.
allow = ["ISC", "MIT", "OpenSSL"]
name = "ring"

# ─── Bans ───────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

# ─── Sources ────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
