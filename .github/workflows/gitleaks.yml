name: Secret scan

# Runs gitleaks against every PR and against pushes to the default
# branch. PR runs scan only the commits added by the PR; default-branch
# runs scan the full history.
#
# Uses the gitleaks binary directly rather than the
# gitleaks/gitleaks-action wrapper because the wrapper requires a
# paid license for org accounts.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        # taiki-e/install-action does not actually ship a gitleaks build
        # (gitleaks is Go, not on crates.io for the binstall fallback),
        # and gitleaks/gitleaks-action requires a paid license for org
        # accounts. Download the upstream release tarball directly and
        # verify it against the published sha256 — this is portable
        # across every repo and pins the binary to a known artifact.
        shell: bash
        env:
          GITLEAKS_VERSION: 8.21.2
          # sha256 of gitleaks_8.21.2_linux_x64.tar.gz from upstream
          # gitleaks_8.21.2_checksums.txt. Bump together with the rev
          # in .pre-commit-config.yaml.
          GITLEAKS_SHA256: 5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL -o "$tarball" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f "$tarball" gitleaks
          gitleaks version

      - name: Scan
        shell: bash
        env:
          GITLEAKS_COMMON: --redact --no-banner --verbose --exit-code 1
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect \
              --source . \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              $GITLEAKS_COMMON
          else
            gitleaks detect --source . $GITLEAKS_COMMON
          fi
