# Pre-commit hooks for this repository.
#
# One-time setup (per checkout):
#   pip install pre-commit
#   pre-commit install
#
# To rescan the whole repo manually:
#   pre-commit run --all-files
#
# To bump pinned hook versions:
#   pre-commit autoupdate

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Rust hooks run via the host toolchain (no nested venv) so they share
  # the project's pinned cargo / rustc and the same target/ cache CI uses.
  # types: [rust] gates the hook to commits that touch *.rs files;
  # pass_filenames: false stops pre-commit from appending file paths,
  # which cargo fmt / clippy do not accept as positional args.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --all -- --check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy --workspace --all-targets -- -D warnings
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
