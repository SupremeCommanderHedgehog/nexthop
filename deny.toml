# cargo-deny configuration.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ─── Advisories ─────────────────────────────────────────────────────
[advisories]
version = 2
yanked = "deny"
ignore = [
    # ── Security ───────────────────────────────────────────────────
    # GHSA-wrw7-89jp-8q8g / RUSTSEC-2024-0429 — glib < 0.20.0 unsoundness
    # in VariantStrIter. Linux-only transitive via tauri → wry → gtk-rs
    # 0.18; there is no tauri 2.x release on gtk-rs 0.20 yet. Revisit when
    # tauri/wry upgrade.
    "RUSTSEC-2024-0429",

    # ── Unmaintained: gtk-rs 0.18 family ──────────────────────────
    # The entire gtk-rs 0.18 family is marked unmaintained in favour of
    # the 0.20 line. All come in transitively via tauri → wry → gtk-rs
    # 0.18 on Linux only. Same revisit trigger as RUSTSEC-2024-0429.
    "RUSTSEC-2024-0411", # atk
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # gdkx11
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gdk-sys
    "RUSTSEC-2024-0416", # gio
    "RUSTSEC-2024-0417", # gio-sys
    "RUSTSEC-2024-0418", # glib-sys
    "RUSTSEC-2024-0419", # pango
    "RUSTSEC-2024-0420", # gtk
    "RUSTSEC-2024-0421", # gtk-sys (reserved if surfaced)
    "RUSTSEC-2024-0422", # atk-sys (reserved if surfaced)

    # ── Unmaintained: misc transitive ─────────────────────────────
    # proc-macro-error 1.x is unmaintained; the maintained fork
    # `proc-macro-error2` exists but we don't depend on it directly —
    # it's pulled in by Tauri's macro stack. Will resolve when Tauri
    # migrates.
    "RUSTSEC-2024-0370",

    # ── Unmaintained: unic-* family ───────────────────────────────
    # The `unic-*` Unicode crates are unmaintained. They come in via
    # Tauri's URL-handling deps (idna → unic-…). Same situation as the
    # gtk-rs family — wait for upstream to migrate.
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]

# ─── Licenses ───────────────────────────────────────────────────────
# This project is GPL-3.0-or-later. Allow common permissive licenses
# that are compatible with GPL distribution, plus the GPL/MPL families.
[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "GPL-3.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

[[licenses.exceptions]]
# `ring` ships a custom license that combines ISC, MIT, and OpenSSL
# clauses. Allow it explicitly.
allow = ["ISC", "MIT", "OpenSSL"]
name = "ring"

# ─── Bans ───────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

# ─── Sources ────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
