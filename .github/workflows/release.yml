name: Release

# Build and attach platform binaries when a vX.Y.Z tag is pushed.
# Triggered automatically by the release commit pattern documented in
# scripts/bump-version.ps1 ("git push origin master --tags").
#
# The matching GitHub release is created by the maintainer via
# `gh release create vX.Y.Z` immediately after the tag push.  If the
# release doesn't exist yet when this workflow runs, tauri-action
# creates it.  Either way, the binaries land on the same release page.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.2.2)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ""
          - name: windows-x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: ""
          - name: macos-universal
            os: macos-latest
            rust-target: universal-apple-darwin
            tauri-args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform.rust-target }}

      - name: Install Linux dependencies (Tauri)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: release-${{ matrix.platform.name }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build + bundle (tauri-action)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Binaries built by the Release workflow. See [CHANGELOG.md](https://github.com/SupremeCommanderHedgehog/nexthop/blob/master/CHANGELOG.md) for the release notes."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.platform.tauri-args }}

  # SBOMs are generated once (the dep tree is the same across platforms)
  # and attached to the release alongside the binaries. Runs after `build`
  # so it doesn't publish SBOMs for a release that failed to ship.
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Generate SPDX SBOM (anchore/syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: nexthop-${{ github.event.inputs.tag || github.ref_name }}.spdx.json
          # anchore's `upload-release-assets` is a no-op outside `release:`
          # events, so we upload from a follow-up step instead.
          upload-release-assets: false
          upload-artifact: false

      - name: Generate CycloneDX SBOM (anchore/syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: nexthop-${{ github.event.inputs.tag || github.ref_name }}.cdx.json
          upload-release-assets: false
          upload-artifact: false

      - name: Attach SBOMs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release upload "$TAG" \
            "nexthop-${TAG}.spdx.json" \
            "nexthop-${TAG}.cdx.json" \
            --clobber
